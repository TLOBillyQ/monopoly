name: regression

on:
  push:
  pull_request:

jobs:
  lua-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run regression
        run: lua tests/regression.lua

      - name: Collect deploy line counts
        run: |
          target_path="$RUNNER_TEMP/monopoly-deploy"
          output="$(lua scripts/deploy.lua --target-path "$target_path" 2>&1)"
          printf '%s\n' "$output"

          summary_lines="$(printf '%s\n' "$output" | grep -E '有效代码行数|^[[:space:]]+- (Config|src|vendor|main\.lua|Data/UIManagerNodes\.lua|Data/Prefab\.lua):' || true)"

          if [[ -n "$summary_lines" ]]; then
            {
              echo '## Deploy line counts'
              echo ''
              while IFS= read -r line; do
                trimmed="$(printf '%s' "$line" | sed 's/^[[:space:]]*//')"
                echo "- $trimmed"
              done <<< "$summary_lines"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
