name: regression

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  LUA_VERSION: "5.5.0"

jobs:
  lua-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Validate submodule token
        env:
          CI_SUBMODULES_TOKEN: ${{ secrets.CI_SUBMODULES_TOKEN }}
        run: |
          if [[ -z "$CI_SUBMODULES_TOKEN" ]]; then
            echo "::error::Missing secret CI_SUBMODULES_TOKEN. Configure a read-only token that can access TLOBillyQ/monopoly, TLOBillyQ/arch_view, TLOBillyQ/crap4lua, and TLOBillyQ/mutate4lua."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_SUBMODULES_TOKEN }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: vendor/arch_view/go.mod

      - name: Install Lua 5.5
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          curl -fsSLO "https://www.lua.org/ftp/lua-${LUA_VERSION}.tar.gz"
          tar -xzf "lua-${LUA_VERSION}.tar.gz"
          cd "lua-${LUA_VERSION}"
          make linux
          make INSTALL_TOP="$HOME/.local/lua-${LUA_VERSION}" install
          echo "$HOME/.local/lua-${LUA_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          lua -v
          lua -v | grep 'Lua 5.5'
          go version
          go version | grep 'go1.26'

      - name: Validate crap wrapper help
        run: lua scripts/quality/crap.lua --help >/dev/null

      - name: Run regression
        run: lua tests/regression.lua

      - name: Collect deploy line counts
        run: |
          target_path="$RUNNER_TEMP/monopoly-deploy"
          output="$(lua scripts/ops/deploy.lua --target-path "$target_path" 2>&1)"
          printf '%s\n' "$output"

          summary_lines="$(printf '%s\n' "$output" | grep -E '有效代码行数|^[[:space:]]+- (Config|src|vendor|main\.lua|Data/UIManagerNodes\.lua|Data/Prefab\.lua):' || true)"

          if [[ -n "$summary_lines" ]]; then
            {
              echo '## Deploy line counts'
              echo ''
              while IFS= read -r line; do
                trimmed="$(printf '%s' "$line" | sed 's/^[[:space:]]*//')"
                echo "- $trimmed"
              done <<< "$summary_lines"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
