name: regression

on:
  push:
  pull_request:

jobs:
  lua-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run regression
        run: lua tests/regression.lua

      - name: Collect deploy line counts
        shell: pwsh
        run: |
          $targetPath = Join-Path $env:RUNNER_TEMP "monopoly-deploy"
          $output = & ./scripts/deploy.ps1 -TargetPath $targetPath 2>&1
          $output | ForEach-Object { Write-Host $_ }

          $summaryLines = @($output | Where-Object {
            $_ -match '有效代码行数' -or $_ -match '^\s+- (Config|src|vendor|main\.lua|Data/UIManagerNodes\.lua|Data/Prefab\.lua):'
          })

          if ($summaryLines.Count -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Deploy line counts'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            foreach ($line in $summaryLines) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- {0}" -f $line.Trim())
            }
          }
