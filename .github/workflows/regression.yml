name: regression

on:
  push:
  pull_request:

jobs:
  lua-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run regression
        run: lua tests/regression.lua
